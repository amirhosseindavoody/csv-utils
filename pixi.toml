[workspace]
name = "csv-utils"
version = "2026.6.24+1"
description = "High-performance CSV CLI + TUI explorer"
channels = ["conda-forge"]
platforms = ["linux-64"]
preview = ["pixi-build"]

[package]
name = "csv-utils"
version = "2026.6.24+1"

[package.build]
backend = { name = "pixi-build-rattler-build", version = "0.*" }

[feature.dev.dependencies]
python = ">=3.14.4,<3.15"
pandas = ">=3.0.2,<4"
numpy = ">=2.4.3,<3"
rust = ">=1.96.0,<1.97"

[feature.test.dependencies]
csv-utils = { path = "." }

[tasks]
build = "cargo build --release"
csv = "cargo run --release -p csv-utils --"
tui = "cargo run --release -p csv-utils -- tui"
test = "cargo test"
gen-test-data = "python scripts/generate_test_data.py"
test-tui-small = "pixi run tui test-data/generated/test_1000x100.csv"
test-tui-large = "pixi run tui test-data/generated/test_10000x1000.csv"
test-tui-large-capture = "pixi run build && python scripts/capture_tui_snapshot.py --file test-data/generated/test_10000x1000.csv --seconds 2.0 --rows 40 --cols 140 --output artifacts/tui_snapshot_large.txt --raw-output artifacts/tui_snapshot_large.raw"
web = "cargo run --release -p csv-utils-web -- \"$@\"' --"
web-tui = "pixi run web -- test-data/generated/test_1000x100.csv"
conda-package = "pixi publish --target-dir dist"
update-version = "scripts/update-version.sh"

[environments]
default = { features = ["dev"] }
test = { features = ["test"] }
