<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>csv-utils</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f6f8fa;
      --panel: #ffffff;
      --border: #d0d7de;
      --text: #1f2328;
      --muted: #656d76;
      --accent: #0969da;
      --select-row: #eaeef2;
      --select-cell: #bf8700;
      --select-cell-text: #1f2328;
      --sidebar-select: #8250df;
      --header-select: #0969da;
      --surface-muted: #f6f8fa;
      --hover: #eaeef2;
      --overlay: rgba(31, 35, 40, 0.5);
    }

    @media (prefers-color-scheme: dark) {
      :root:not([data-theme="light"]) {
        color-scheme: dark;
        --bg: #0f1419;
        --panel: #1a2332;
        --border: #2d3a4f;
        --text: #e6edf3;
        --muted: #8b949e;
        --accent: #58a6ff;
        --select-row: #30363d;
        --select-cell: #d29922;
        --select-cell-text: #111;
        --sidebar-select: #8957e5;
        --header-select: #1f6feb;
        --surface-muted: #121820;
        --hover: #21262d;
        --overlay: rgba(0, 0, 0, 0.72);
      }
    }

    :root[data-theme="light"] {
      color-scheme: light;
    }

    :root[data-theme="dark"] {
      color-scheme: dark;
      --bg: #0f1419;
      --panel: #1a2332;
      --border: #2d3a4f;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #58a6ff;
      --select-row: #30363d;
      --select-cell: #d29922;
      --select-cell-text: #111;
      --sidebar-select: #8957e5;
      --header-select: #1f6feb;
      --surface-muted: #121820;
      --hover: #21262d;
      --overlay: rgba(0, 0, 0, 0.72);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font: 14px/1.4 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      background: var(--bg);
      color: var(--text);
    }
    .app { display: grid; grid-template-rows: auto 1fr auto; min-height: 100vh; }
    header, footer {
      border: 1px solid var(--border);
      background: var(--panel);
      padding: 0.6rem 1rem;
    }
    header {
      border-top: none;
      border-left: none;
      border-right: none;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-wrap: wrap;
    }
    footer { border-bottom: none; border-left: none; border-right: none; color: var(--muted); font-size: 12px; }
    .title { font-weight: 700; }
    .badge { color: var(--accent); }
    .header-spacer { flex: 1; }
    .theme-toggle {
      border: 1px solid var(--border);
      background: var(--surface-muted);
      color: var(--text);
      font: inherit;
      font-size: 12px;
      padding: 0.35rem 0.65rem;
      border-radius: 6px;
      cursor: pointer;
    }
    .theme-toggle:hover { background: var(--hover); }
    main {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 0;
      min-height: 0;
    }
    .panel {
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    .panel:last-child { border-right: none; }
    .panel-head {
      padding: 0.5rem 0.75rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface-muted);
      font-weight: 600;
    }
    .panel-scroll {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
    }
    .scroll-host {
      display: flex;
      flex: 1;
      min-height: 0;
      min-width: 0;
    }
    .scroll-body { flex: 1; overflow: hidden; min-height: 0; min-width: 0; }
    .table-wrap { flex: 1; overflow: hidden; min-height: 0; min-width: 0; }
    table { border-collapse: collapse; width: max-content; min-width: 100%; }
    th, td {
      border: 1px solid var(--border);
      padding: 0.15rem 0.35rem;
      white-space: pre;
      overflow: hidden;
    }
    th {
      background: var(--surface-muted);
      position: sticky;
      top: 0;
      z-index: 1;
    }
    th .col-resize-handle {
      position: absolute;
      right: 0;
      top: 0;
      bottom: 0;
      width: 6px;
      cursor: col-resize;
      touch-action: none;
    }
    th .col-resize-handle:hover { background: var(--accent); opacity: 0.35; }
    body.col-resizing { cursor: col-resize; user-select: none; }
    th.selected { background: var(--header-select); color: white; }
    tr.row-selected td { background: var(--select-row); }
    td.selected { background: var(--select-cell); color: var(--select-cell-text); font-weight: 700; }
    td.num, th.num { text-align: right; }
    .sidebar {
      flex: 1;
      overflow: hidden;
      padding: 0.25rem 0;
      min-height: 0;
    }
    .sidebar button {
      display: block;
      width: 100%;
      text-align: left;
      border: none;
      background: transparent;
      color: var(--text);
      font: inherit;
      padding: 0.25rem 0.75rem;
      cursor: pointer;
    }
    .sidebar button:hover { background: var(--hover); }
    .sidebar button.selected { background: var(--sidebar-select); color: white; font-weight: 700; }
    .help-overlay {
      position: fixed; inset: 0; background: var(--overlay);
      display: none; align-items: center; justify-content: center; z-index: 10;
    }
    .help-overlay.open { display: flex; }
    .info-overlay {
      position: fixed; inset: 0; background: var(--overlay);
      display: none; align-items: center; justify-content: center; z-index: 11;
    }
    .info-overlay.open { display: flex; }
    .info-box {
      background: var(--panel); border: 1px solid var(--border);
      padding: 1rem 1.25rem; min-width: 300px; max-width: 440px;
      max-height: min(85vh, 640px);
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--muted) var(--surface-muted);
    }
    .info-box::-webkit-scrollbar { width: 10px; }
    .info-box::-webkit-scrollbar-track { background: var(--surface-muted); }
    .info-box::-webkit-scrollbar-thumb {
      background: var(--muted);
      border-radius: 5px;
      border: 2px solid var(--surface-muted);
    }
    .vscroll, .hscroll {
      background: var(--surface-muted);
      position: relative;
      flex-shrink: 0;
      visibility: hidden;
    }
    .vscroll.needs-scroll, .hscroll.needs-scroll { visibility: visible; }
    .vscroll {
      width: 10px;
      border-left: 1px solid var(--border);
    }
    .hscroll {
      height: 10px;
      border-top: 1px solid var(--border);
    }
    .vscroll-thumb, .hscroll-thumb {
      position: absolute;
      background: var(--muted);
      border-radius: 4px;
      opacity: 0.85;
      cursor: grab;
    }
    body.scroll-dragging {
      user-select: none;
      cursor: grabbing;
    }
    body.scroll-dragging .vscroll-thumb,
    body.scroll-dragging .hscroll-thumb {
      cursor: grabbing;
    }
    .vscroll.needs-scroll, .hscroll.needs-scroll {
      cursor: pointer;
    }
    .vscroll-thumb {
      left: 2px;
      right: 2px;
      top: 0;
      min-height: 24px;
    }
    .hscroll-thumb {
      top: 2px;
      bottom: 2px;
      left: 0;
      min-width: 24px;
    }
    .info-box h2 { margin: 0 0 0.75rem; font-size: 1rem; }
    .info-box .format-section { margin: 0.75rem 0 0.25rem; font-weight: 600; color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: 0.04em; }
    .info-box .format-options { display: flex; flex-direction: column; gap: 0.15rem; }
    .info-box .format-options button {
      text-align: left; border: 1px solid transparent; background: transparent;
      color: var(--text); font: inherit; padding: 0.3rem 0.5rem; border-radius: 4px; cursor: pointer;
    }
    .info-box .format-options button:hover { background: var(--hover); }
    .info-box .format-options button.selected { color: var(--accent); font-weight: 700; }
    .info-box .format-options button.focused { border-color: var(--accent); background: var(--hover); }
    .info-box .info-decimal {
      width: 5rem;
      font: inherit;
      padding: 0.35rem 0.5rem;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--surface-muted);
      color: var(--text);
    }
    .info-box .info-decimal.focused { outline: 2px solid var(--accent); border-color: var(--accent); }
    .info-stats { margin-top: 0.75rem; border-collapse: collapse; width: 100%; font-size: 13px; }
    .info-stats td { padding: 0.2rem 0; vertical-align: top; }
    .info-stats td:first-child { color: var(--muted); padding-right: 1rem; white-space: nowrap; }
    .info-stats td:last-child { font-weight: 600; }
    .help-box {
      background: var(--panel); border: 1px solid var(--border);
      padding: 1.25rem 1.5rem; max-width: 520px; white-space: pre-wrap;
    }
    .empty { padding: 2rem; color: var(--muted); }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <span class="title">csv-utils</span>
      <span id="meta" class="badge">loading…</span>
      <span class="header-spacer"></span>
      <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Theme: System. Click to change.">Theme: System</button>
    </header>
    <main>
      <section class="panel">
        <div id="table-title" class="panel-head">Data</div>
        <div class="panel-scroll">
          <div class="scroll-host">
            <div id="table-wrap" class="table-wrap scroll-body"></div>
            <div class="vscroll" id="table-vscroll" aria-hidden="true"><div class="vscroll-thumb"></div></div>
          </div>
          <div class="hscroll" id="table-hscroll" aria-hidden="true"><div class="hscroll-thumb"></div></div>
        </div>
      </section>
      <section class="panel">
        <div id="sidebar-title" class="panel-head">Columns</div>
        <div class="scroll-host">
          <div id="sidebar" class="sidebar scroll-body"></div>
          <div class="vscroll" id="sidebar-vscroll" aria-hidden="true"><div class="vscroll-thumb"></div></div>
        </div>
      </section>
    </main>
    <footer id="hints">arrows navigate · drag resize · c info · ? help · theme</footer>
  </div>
  <div id="help" class="help-overlay"><div class="help-box" id="help-text"></div></div>
  <div id="info" class="info-overlay"><div class="info-box" id="info-box"></div></div>
  <script>
    const HELP = `csv-utils — browser UI

  ↑/↓        previous / next row
  ←/→        previous / next column
  PgUp/PgDn  scroll 10 rows
  c          column info (type, format, stats)
  ?          help
  q          close panel / help

Click table cells or column list items to select.
Mouse wheel on table/columns scrolls rows/columns.
Drag column header right edge to resize (4–64 chars).

Theme button (header): System · Light · Dark.`;

    const REPR_OPTIONS = ['general', 'scientific'];

    const MIN_COL_WIDTH = 4;
    const MAX_COL_WIDTH = 64;
    const THEME_KEY = 'csv-utils-theme';
    const THEMES = ['system', 'light', 'dark'];
    const THEME_LABELS = { system: 'System', light: 'Light', dark: 'Dark' };

    let pollTimer = null;
    let pollInFlight = false;
    let columnResize = null;
    let pendingColumnWidths = {};
    let skipPoll = false;
    let lastState = null;

    function columnWidth(col) {
      if (pendingColumnWidths[col.index] != null) {
        return pendingColumnWidths[col.index];
      }
      return col.width;
    }

    function widthStyle(w) {
      return `width:${w}ch;min-width:${w}ch;max-width:${w}ch`;
    }

    function applyPendingColumnWidths() {
      const table = document.querySelector('#table-wrap table');
      if (!table) return;
      for (const [col, width] of Object.entries(pendingColumnWidths)) {
        const style = widthStyle(width);
        table.querySelectorAll(`th[data-col="${col}"], td[data-col="${col}"]`).forEach(el => {
          el.style.width = `${width}ch`;
          el.style.minWidth = `${width}ch`;
          el.style.maxWidth = `${width}ch`;
        });
      }
    }

    document.addEventListener('mousemove', (e) => {
      if (!columnResize) return;
      const charWidth = 8;
      const delta = Math.round((e.clientX - columnResize.startX) / charWidth);
      const width = Math.min(MAX_COL_WIDTH, Math.max(MIN_COL_WIDTH, columnResize.startWidth + delta));
      pendingColumnWidths[columnResize.col] = width;
      applyPendingColumnWidths();
    });

    document.addEventListener('mouseup', async () => {
      if (!columnResize) return;
      const col = columnResize.col;
      const width = pendingColumnWidths[col];
      columnResize = null;
      document.body.classList.remove('col-resizing');
      skipPoll = false;
      if (width != null) {
        await postAction('set_column_width', { col, width });
        delete pendingColumnWidths[col];
      }
    });

    function applyTheme(mode) {
      const root = document.documentElement;
      if (mode === 'system') {
        root.removeAttribute('data-theme');
      } else {
        root.dataset.theme = mode;
      }
      const btn = document.getElementById('theme-toggle');
      const label = THEME_LABELS[mode];
      btn.textContent = `Theme: ${label}`;
      btn.setAttribute('aria-label', `Theme: ${label}. Click to change.`);
    }

    function loadTheme() {
      const saved = localStorage.getItem(THEME_KEY);
      const mode = THEMES.includes(saved) ? saved : 'system';
      applyTheme(mode);
      return mode;
    }

    function cycleTheme() {
      const current = localStorage.getItem(THEME_KEY) || 'system';
      const next = THEMES[(THEMES.indexOf(current) + 1) % THEMES.length];
      localStorage.setItem(THEME_KEY, next);
      applyTheme(next);
    }

    loadTheme();
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
      if ((localStorage.getItem(THEME_KEY) || 'system') === 'system') {
        applyTheme('system');
      }
    });
    document.getElementById('theme-toggle').addEventListener('click', cycleTheme);

    async function postAction(action, value) {
      const res = await fetch('/api/action', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action, value }),
      });
      render(await res.json());
    }

    let wheelTimer = null;
    let wheelDelta = 0;
    function queueWheelAction(action, delta) {
      wheelDelta += delta;
      clearTimeout(wheelTimer);
      wheelTimer = setTimeout(() => {
        const step = wheelDelta;
        wheelDelta = 0;
        postAction(action, step);
      }, 32);
    }

    function updateVScroll(trackEl, meta) {
      const thumb = trackEl.querySelector('.vscroll-thumb');
      const { offset, total, viewport } = meta;
      if (total <= viewport) {
        trackEl.classList.remove('needs-scroll');
        return;
      }
      trackEl.classList.add('needs-scroll');
      const trackH = trackEl.clientHeight || 1;
      const thumbH = Math.max(24, Math.round(trackH * (viewport / total)));
      const maxTop = Math.max(0, trackH - thumbH);
      const top = maxTop > 0
        ? Math.round((offset / Math.max(1, total - viewport)) * maxTop)
        : 0;
      thumb.style.height = `${thumbH}px`;
      thumb.style.top = `${top}px`;
    }

    function updateHScroll(trackEl, meta) {
      const thumb = trackEl.querySelector('.hscroll-thumb');
      const { offset, total, viewport } = meta;
      if (total <= viewport) {
        trackEl.classList.remove('needs-scroll');
        return;
      }
      trackEl.classList.add('needs-scroll');
      const trackW = trackEl.clientWidth || 1;
      const thumbW = Math.max(24, Math.round(trackW * (viewport / total)));
      const maxLeft = Math.max(0, trackW - thumbW);
      const left = maxLeft > 0
        ? Math.round((offset / Math.max(1, total - viewport)) * maxLeft)
        : 0;
      thumb.style.width = `${thumbW}px`;
      thumb.style.left = `${left}px`;
    }

    function scrollMax(meta) {
      return Math.max(0, meta.total - meta.viewport);
    }

    function offsetFromPointer(trackEl, thumbEl, clientPos, meta, axis, grabOffset) {
      const maxScroll = scrollMax(meta);
      if (axis === 'v') {
        const trackRect = trackEl.getBoundingClientRect();
        const thumbH = thumbEl.offsetHeight;
        const maxTop = Math.max(0, trackEl.clientHeight - thumbH);
        const top = clientPos - trackRect.top - grabOffset;
        const ratio = maxTop > 0 ? Math.min(1, Math.max(0, top / maxTop)) : 0;
        return Math.round(ratio * maxScroll);
      }
      const trackRect = trackEl.getBoundingClientRect();
      const thumbW = thumbEl.offsetWidth;
      const maxLeft = Math.max(0, trackEl.clientWidth - thumbW);
      const left = clientPos - trackRect.left - grabOffset;
      const ratio = maxLeft > 0 ? Math.min(1, Math.max(0, left / maxLeft)) : 0;
      return Math.round(ratio * maxScroll);
    }

    let scrollDrag = null;

    function bindScrollDrag(trackEl, action, metaKey, axis) {
      trackEl.addEventListener('mousedown', (e) => {
        if (!trackEl.classList.contains('needs-scroll')) return;
        const thumbEl = trackEl.querySelector(axis === 'v' ? '.vscroll-thumb' : '.hscroll-thumb');
        const meta = lastState?.[metaKey];
        if (!meta || !thumbEl) return;
        e.preventDefault();
        const onThumb = thumbEl.contains(e.target);
        const grabOffset = axis === 'v'
          ? (onThumb ? e.clientY - thumbEl.getBoundingClientRect().top : thumbEl.offsetHeight / 2)
          : (onThumb ? e.clientX - thumbEl.getBoundingClientRect().left : thumbEl.offsetWidth / 2);
        const clientPos = axis === 'v' ? e.clientY : e.clientX;
        const offset = offsetFromPointer(trackEl, thumbEl, clientPos, meta, axis, grabOffset);
        if (axis === 'v') {
          updateVScroll(trackEl, { ...meta, offset });
        } else {
          updateHScroll(trackEl, { ...meta, offset });
        }
        scrollDrag = { trackEl, thumbEl, action, metaKey, axis, grabOffset, pendingOffset: offset };
        skipPoll = true;
        document.body.classList.add('scroll-dragging');
      });
    }

    bindScrollDrag(document.getElementById('table-vscroll'), 'set_row_offset', 'table_rows_scroll', 'v');
    bindScrollDrag(document.getElementById('table-hscroll'), 'set_col_offset', 'table_cols_scroll', 'h');
    bindScrollDrag(document.getElementById('sidebar-vscroll'), 'set_column_list_offset', 'sidebar_scroll', 'v');

    document.addEventListener('mousemove', (e) => {
      if (!scrollDrag) return;
      const meta = lastState?.[scrollDrag.metaKey];
      if (!meta) return;
      const clientPos = scrollDrag.axis === 'v' ? e.clientY : e.clientX;
      const offset = offsetFromPointer(
        scrollDrag.trackEl,
        scrollDrag.thumbEl,
        clientPos,
        meta,
        scrollDrag.axis,
        scrollDrag.grabOffset,
      );
      if (scrollDrag.axis === 'v') {
        updateVScroll(scrollDrag.trackEl, { ...meta, offset });
      } else {
        updateHScroll(scrollDrag.trackEl, { ...meta, offset });
      }
      scrollDrag.pendingOffset = offset;
    });

    document.addEventListener('mouseup', async () => {
      if (!scrollDrag) return;
      const { action, pendingOffset } = scrollDrag;
      scrollDrag = null;
      skipPoll = false;
      document.body.classList.remove('scroll-dragging');
      if (pendingOffset != null) {
        await postAction(action, pendingOffset);
      }
    });

    function render(state) {
      lastState = state;
      document.getElementById('meta').textContent =
        `${state.file} · ${state.row_count} rows · ${state.status_line}`;
      document.getElementById('table-title').textContent =
        `Data (rows ${state.table.row_start + 1}–${state.table.row_end})`;
      document.getElementById('sidebar-title').textContent =
        `Columns (${state.sidebar_scroll.offset + 1}–${Math.min(state.sidebar_scroll.offset + state.sidebar.length, state.sidebar_scroll.total)}/${state.sidebar_scroll.total})`;

      const wrap = document.getElementById('table-wrap');
      if (!state.table.rows.length) {
        wrap.innerHTML = '<div class="empty">No rows loaded. Open a CSV file when starting the server.</div>';
      } else {
        let html = '<table><thead><tr>';
        for (const col of state.table.columns) {
          const w = columnWidth(col);
          const cls = col.selected ? 'selected' : '';
          html += `<th class="${cls}" data-col="${col.index}" style="${widthStyle(w)}">${escapeHtml(col.name)}<span class="col-resize-handle" data-col="${col.index}"></span></th>`;
        }
        html += '</tr></thead><tbody>';
        for (const row of state.table.rows) {
          html += `<tr class="${row.selected ? 'row-selected' : ''}">`;
          row.cells.forEach((cell, i) => {
            const col = state.table.columns[i];
            const w = columnWidth(col);
            const cls = [cell.align_right ? 'num' : '', cell.selected ? 'selected' : ''].filter(Boolean).join(' ');
            html += `<td class="${cls}" data-row="${row.index}" data-col="${col.index}" style="${widthStyle(w)}">${escapeHtml(cell.text)}</td>`;
          });
          html += '</tr>';
        }
        html += '</tbody></table>';
        wrap.innerHTML = html;
        wrap.querySelectorAll('.col-resize-handle').forEach(handle => {
          handle.addEventListener('mousedown', (e) => {
            e.preventDefault();
            e.stopPropagation();
            const col = +handle.dataset.col;
            const colMeta = state.table.columns.find(c => c.index === col);
            columnResize = {
              col,
              startX: e.clientX,
              startWidth: columnWidth(colMeta || { index: col, width: 18 }),
            };
            skipPoll = true;
            document.body.classList.add('col-resizing');
          });
        });
        wrap.querySelectorAll('td[data-row]').forEach(td => {
          td.addEventListener('click', () => {
            postAction('select_cell', { row: +td.dataset.row, col: +td.dataset.col });
          });
        });
        wrap.querySelectorAll('th').forEach((th, i) => {
          th.addEventListener('click', (e) => {
            if (e.target.classList.contains('col-resize-handle')) return;
            postAction('select_column', state.table.columns[i].index);
          });
        });
        applyPendingColumnWidths();
      }

      const sidebar = document.getElementById('sidebar');
      sidebar.innerHTML = state.sidebar.map(item =>
        `<button class="${item.selected ? 'selected' : ''}" data-col="${item.index}">${escapeHtml(item.label)}</button>`
      ).join('');
      sidebar.querySelectorAll('button').forEach(btn => {
        btn.addEventListener('click', () => postAction('select_column', +btn.dataset.col));
      });

      const help = document.getElementById('help');
      help.classList.toggle('open', state.show_help);
      document.getElementById('help-text').textContent = HELP;

      renderInfoPane(state);

      requestAnimationFrame(() => {
        updateVScroll(document.getElementById('table-vscroll'), state.table_rows_scroll);
        updateHScroll(document.getElementById('table-hscroll'), state.table_cols_scroll);
        updateVScroll(document.getElementById('sidebar-vscroll'), state.sidebar_scroll);
      });

      schedulePoll(state);
    }

    function renderInfoPane(state) {
      const overlay = document.getElementById('info');
      const box = document.getElementById('info-box');
      overlay.classList.toggle('open', state.show_column_info);
      if (!state.show_column_info || !state.column_info) {
        box.innerHTML = '';
        return;
      }
      const info = state.column_info;
      const typeButtons = info.available_types.map((kind, idx) => {
        const inferred = kind === 'auto' && info.effective_kind !== 'auto'
          ? ` (inferred: ${info.effective_kind})` : '';
        const selected = info.stored_kind === kind ? ' selected' : '';
        const focused = info.focus === idx ? ' focused' : '';
        return `<button type="button" class="info-kind${selected}${focused}" data-kind="${kind}">${kind}${inferred}${selected ? ' ✓' : ''}</button>`;
      }).join('');
      let reprHtml = '';
      if (info.repr_section_visible) {
        const currentRepr = info.numeric_repr || 'general';
        const reprButtons = REPR_OPTIONS.map((repr, offset) => {
          const idx = info.available_types.length + offset;
          const selected = currentRepr === repr ? ' selected' : '';
          const focused = info.focus === idx ? ' focused' : '';
          return `<button type="button" class="info-repr${selected}${focused}" data-repr="${repr}">${repr}${selected ? ' ✓' : ''}</button>`;
        }).join('');
        reprHtml = `<div class="format-section">Representation</div><div class="format-options">${reprButtons}</div>`;
      }
      let decimalHtml = '';
      if (info.decimal_section_visible) {
        const decIdx = info.available_types.length + 2;
        const focused = info.focus === decIdx ? ' focused' : '';
        const value = info.decimal_editing ? info.decimal_draft : (info.decimal_format || '.3');
        decimalHtml = `<div class="format-section">Decimal places</div>
          <input type="text" class="info-decimal${focused}" id="decimal-input" value="${escapeHtml(value)}" aria-label="Decimal format (e.g. .3)" />`;
      }
      const prevScroll = box.scrollTop;
      const statsRows = info.stats.map(s =>
        `<tr><td>${escapeHtml(s.label)}</td><td>${escapeHtml(s.value)}</td></tr>`
      ).join('');
      box.innerHTML = `<h2>Column ${info.column_index}: ${escapeHtml(info.column_name)}</h2>
        <div class="format-section">Type</div>
        <div class="format-options">${typeButtons}</div>
        ${reprHtml}
        ${decimalHtml}
        <div class="format-section">Statistics</div>
        <table class="info-stats"><tbody>${statsRows}</tbody></table>
        <div class="info-hint">Click type/repr, edit decimal format, ↑/↓ and Enter, or scroll. q closes.</div>`;
      const focused = box.querySelector('.focused, .info-decimal.focused');
      if (focused) {
        focused.scrollIntoView({ block: 'nearest' });
      } else {
        box.scrollTop = prevScroll;
      }
      const decimalInput = document.getElementById('decimal-input');
      if (decimalInput) {
        decimalInput.addEventListener('change', () => {
          if (!lastState?.column_info) return;
          postAction('set_column_decimal_format', {
            col: lastState.column_info.column_index,
            format: decimalInput.value,
          });
        });
      }
    }

    function escapeHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function schedulePoll(state) {
      clearTimeout(pollTimer);
      if (skipPoll) return;
      if (!state.scan_done) {
        pollTimer = setTimeout(refresh, 150);
      }
    }

    async function refresh() {
      if (pollInFlight) return;
      pollInFlight = true;
      try {
        const res = await fetch('/api/state');
        render(await res.json());
      } finally {
        pollInFlight = false;
      }
    }

    document.addEventListener('keydown', (e) => {
      if (lastState?.show_column_info) {
        if (e.key === 'q') { e.preventDefault(); postAction('close_column_info', null); return; }
        if (e.key === 'ArrowUp') { e.preventDefault(); postAction('column_info_focus_delta', -1); return; }
        if (e.key === 'ArrowDown') { e.preventDefault(); postAction('column_info_focus_delta', 1); return; }
        if (e.key === 'Enter') { e.preventDefault(); postAction('column_info_apply', null); return; }
      }
      if (lastState?.show_help) {
        if (e.key === 'q' || e.key === '?') { e.preventDefault(); postAction('close_help', null); return; }
      }
      if (e.key === 'ArrowUp') { e.preventDefault(); postAction('row_delta', -1); }
      else if (e.key === 'ArrowDown') { e.preventDefault(); postAction('row_delta', 1); }
      else if (e.key === 'ArrowLeft') { e.preventDefault(); postAction('col_delta', -1); }
      else if (e.key === 'ArrowRight') { e.preventDefault(); postAction('col_delta', 1); }
      else if (e.key === 'PageUp') { e.preventDefault(); postAction('page_rows', -10); }
      else if (e.key === 'PageDown') { e.preventDefault(); postAction('page_rows', 10); }
      else if (e.key === 'Home') { e.preventDefault(); postAction('go_home', null); }
      else if (e.key === 'End') { e.preventDefault(); postAction('go_end', null); }
      else if (e.key === 'c') { e.preventDefault(); postAction('open_column_info', null); }
      else if (e.key === '?') { e.preventDefault(); postAction('toggle_help', null); }
    });

    document.getElementById('table-wrap').addEventListener('wheel', (e) => {
      e.preventDefault();
      queueWheelAction('row_delta', e.deltaY < 0 ? -3 : 3);
    }, { passive: false });

    document.getElementById('sidebar').addEventListener('wheel', (e) => {
      e.preventDefault();
      queueWheelAction('column_list_delta', e.deltaY < 0 ? -3 : 3);
    }, { passive: false });

    document.getElementById('info-box').addEventListener('click', (e) => {
      const kindBtn = e.target.closest('.info-kind');
      if (kindBtn && lastState?.column_info) {
        e.preventDefault();
        postAction('set_column_kind', {
          col: lastState.column_info.column_index,
          kind: kindBtn.dataset.kind,
        });
        return;
      }
      const reprBtn = e.target.closest('.info-repr');
      if (reprBtn && lastState?.column_info) {
        e.preventDefault();
        postAction('set_numeric_repr', {
          col: lastState.column_info.column_index,
          repr: reprBtn.dataset.repr,
        });
        return;
      }
      if (e.target.closest('#decimal-input') && lastState?.column_info) {
        postAction('column_info_focus_delta', lastState.column_info.available_types.length + 2 - lastState.column_info.focus);
      }
    });

    refresh();
  </script>
</body>
</html>
