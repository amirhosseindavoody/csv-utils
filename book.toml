[book]
title = "csv-utils"
authors = ["Amirhossein Davoody"]
description = "High-performance CSV CLI, TUI, and web explorer"
language = "en"
src = "docs"
multilingual = false

[build]
build-dir = "book"
create-missing = false

[output.html]
git-repository-url = "https://github.com/amirhosseindavoody/csv-utils"
edit-url-template = "https://github.com/amirhosseindavoody/csv-utils/edit/main/{path}"
default-theme = "light"
preferred-dark-theme = "ayu"

[output.html.fold]
enable = true
level = 1
