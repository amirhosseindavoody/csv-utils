# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json

context:
  version: 2026.6.26+1

package:
  name: csv-utils
  version: ${{ version }}

source:
  path: ..
  use_gitignore: true

build:
  number: 0
  script:
    - |
      set -euo pipefail
      cd "$SRC_DIR"
      host="$(rustc -vV | sed -n 's/^host: //p')"
      cargo build --locked --release -p csv-utils
      install -Dm755 "target/${host}/release/csv" "$PREFIX/bin/csv"
      rm -f "$PREFIX/.crates.toml" "$PREFIX/.crates2.json"

requirements:
  build:
    - ${{ compiler('rust') }}
    - ${{ compiler('c') }}

tests:
  - script:
      - csv --help

about:
  summary: High-performance CSV CLI, TUI, and browser UI explorer
  license: MIT
  license_file: LICENSE
